<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .product-card {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #f9fafb;
            transition: 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-2px);
            background: #eef2ff;
        }

        .product-name {
            font-weight: bold;
        }

        .product-price {
            color: #4f46e5;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🛒 Products List</h1>

        <form method="GET" action="/products" style="margin-bottom: 25px; display: flex; gap: 10px; justify-content: center;">
            <input type="number" name="min_price" placeholder="Min price" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc;">
            <input type="number" name="max_price" placeholder="Max price" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc;">
            <button type="submit" style="padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer;">Filter</button>
        </form>

        <div style="text-align: right; margin-bottom: 20px;">
            <a href="/add-product" style="background: #4f46e5; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px;">➕ Add Product</a>
        </div>

        {% if items %}
            {% for item in items %}
                <div class="product-card">
                    <div class="product-name">
                        {{ item.name }}
                    </div>

                    <div class="product-price">
                        ${{ item.price }}
                    </div>
                </div>
            {% endfor %}
        {% else %}
            No Products.
        {% endif %}

        <div class="footer">
            Flask + Jinja2 Demo
        </div>
    </div>
</body>
</html>
